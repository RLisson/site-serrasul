name: Deploy to Vercel on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_nSyw8YIm4zVph5sZI3m4FlZa
      VERCEL_PROJECT_ID: prj_zEbAPA1VqdcBoxPyQBEucxakMYcA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm install --global vercel@latest
      - name: Link Vercel project
        run: |
          rm -rf frontend/.vercel
          mkdir -p frontend/.vercel
          cat > frontend/.vercel/project.json <<EOF
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          EOF
      - run: vercel pull --yes --environment=production --cwd=frontend --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --cwd=frontend --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --cwd=frontend --token=${{ secrets.VERCEL_TOKEN }}
